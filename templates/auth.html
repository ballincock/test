
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='./static/css/auth.css') }}">
</head>
<body>
<div class="ffx-wrapper">
  <!-- The Modern Tag -->
  <h1 class="ffx-tag">Fish Fx 2026 0.0.17</h1>


<div class="form-box">
    <div class="tabs">
        <button id="tab-login" class="active" onclick="UI.switch('login')">Login</button>
        <button id="tab-register" onclick="UI.switch('register')">Register</button>
        <button id="tab-forgot" onclick="UI.switch('forgot')">Forgot</button>
    </div>

    <!-- Login Form -->
    <form id="form-login">
        <input type="text" name="id_input" placeholder="Username or Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Log In</button>
    </form>

    <!-- Registration Form -->
    <form id="form-register" class="hidden">
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" id="reg-p1" placeholder="Password" required>
        <input type="password" name="confirm_password" id="reg-p2" placeholder="Confirm Password" required>
        <input type="text" name="security_question" placeholder="Security Question" required>
        <input type="text" name="security_answer" placeholder="Security Answer" required>
        <input type="email" name="backup_email" placeholder="Backup Email">
        <button type="submit">Create Account</button>
    </form>

    <!-- Forgot Password Form -->
    <form id="form-forgot" class="hidden">
        <p style="font-size: 0.8rem; color: #aaa;">Enter email and your Secure Key/Mnemonic to recover.</p>
        <input type="email" name="email" placeholder="Registered Email" required>
        <input type="text" name="key" placeholder="Secure Key or 12-word Mnemonic" required>
        <button type="submit">Verify & Reset</button>
    </form>
</div><p class="embedded-text">
  Wondering how to support or join the cause?
</p><br>

<!-- Modal Container -->
<div id="modal-overlay" class="modal">
    <div class="modal-content">
        <div id="modal-body"></div>
        <button onclick="UI.closeModal()">Close</button>
    </div>
</div>
<div class="metrics-container">



<div class="fish-container">
  <img src="http://localhost/testing/css/s.webp" class="fish-icon" alt="Fish Logo">
</div>
